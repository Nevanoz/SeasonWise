name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-and-rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit and API integration tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Start local Supabase
        run: pnpm --filter @musimaman/backend supabase:start
      - name: Apply migrations and seed
        run: pnpm --filter @musimaman/backend supabase:reset
      - name: Run live RLS tests
        shell: bash
        run: |
          eval "$(cd backend && pnpm exec supabase status -o env)"
          SUPABASE_TEST_URL="$API_URL" \
          SUPABASE_TEST_ANON_KEY="$ANON_KEY" \
          SUPABASE_TEST_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" \
          pnpm --filter @musimaman/backend exec vitest run tests/integration/rls-live.test.ts
      - name: Stop local Supabase
        if: always()
        run: cd backend && pnpm exec supabase stop --no-backup